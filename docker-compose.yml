services:
  db:
    image: mysql:8.0
    container_name: learnflow_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: learnflow_ai
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-learnflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnflow_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: learnflow_ai
      DB_USERNAME: ${DB_USERNAME:-learnflow}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      FRONTEND_URL: http://localhost
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:80
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-4096}
      APP_KEY: ${APP_KEY}
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/var/www/storage
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
  backend_storage:
